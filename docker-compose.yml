services:
  logosnext-api:
    container_name: logosnext-api
    build:
      context: .
      dockerfile: Siaed.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:7142
      ConnectionStrings__DefaultConnection: Server=mysql_server;Port=3306;Database=siaed;User=siaed;Password=${MYSQL_PASSWORD:?set MYSQL_PASSWORD};TreatTinyAsBoolean=false;AllowPublicKeyRetrieval=True;
      Jwt__Key: ${Jwt__Key:?set Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer:-siaed}
      Jwt__Audience: ${Jwt__Audience:-siaed}
      OpenAI__ApiKey: ${OpenAI__ApiKey:?set OpenAI__ApiKey}
    ports:
      - "7142:7142"
    restart: unless-stopped
    volumes:
      - logosnext-api-logs:/app/logs
    networks:
      - nginx_net

  logosnext-migrations:
    build:
      context: .
      dockerfile: Siaed.Api/Dockerfile
    command: ["--migrate-database"]
    profiles:
      - migrations
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:7142
      ConnectionStrings__DefaultConnection: Server=mysql_server;Port=3306;Database=siaed;User=siaed;Password=${MYSQL_PASSWORD:?set MYSQL_PASSWORD};TreatTinyAsBoolean=false;AllowPublicKeyRetrieval=True;
      Jwt__Key: ${Jwt__Key:?set Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer:-siaed}
      Jwt__Audience: ${Jwt__Audience:-siaed}
      OpenAI__ApiKey: ${OpenAI__ApiKey:?set OpenAI__ApiKey}
    networks:
      - nginx_net

volumes:
  logosnext-api-logs:

networks:
  nginx_net:
    external: true
