services:
  siaed-migrations:
    build:
      context: .
      dockerfile: Siaed.Api/Dockerfile
    command: ["--migrate-database"]
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:7142
      ConnectionStrings__DefaultConnection: Server=mysql_server;Port=3306;Database=siaed;User=logos_infra;Password=${MYSQL_PASSWORD:?set MYSQL_PASSWORD};TreatTinyAsBoolean=false;AllowPublicKeyRetrieval=True;
      Jwt__Key: ${Jwt__Key:?set Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer:-siaed}
      Jwt__Audience: ${Jwt__Audience:-siaed}
      OpenAI__ApiKey: ${OpenAI__ApiKey:?set OpenAI__ApiKey}
    networks:
      - nginx_net

  siaed-api:
    container_name: siaed-api
    build:
      context: .
      dockerfile: Siaed.Api/Dockerfile
    depends_on:
      siaed-migrations:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:7142
      ConnectionStrings__DefaultConnection: Server=mysql_server;Port=3306;Database=siaed;User=logos_infra;Password=${MYSQL_PASSWORD:?set MYSQL_PASSWORD};TreatTinyAsBoolean=false;AllowPublicKeyRetrieval=True;
      Jwt__Key: ${Jwt__Key:?set Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer:-siaed}
      Jwt__Audience: ${Jwt__Audience:-siaed}
      OpenAI__ApiKey: ${OpenAI__ApiKey:?set OpenAI__ApiKey}
      UrlApi: ${UrlApi:?set UrlApi}
      Email__EmailSettings__Host: ${Email__EmailSettings__Host:?set Email__EmailSettings__Host}
      Email__EmailSettings__Port: ${Email__EmailSettings__Port:?set Email__EmailSettings__Port}
      Email__EmailSettings__Username: ${Email__EmailSettings__Username:?set Email__EmailSettings__Username}
      Email__EmailSettings__Password: ${Email__EmailSettings__Password:?set Email__EmailSettings__Password}
      Email__EmailSettings__From: ${Email__EmailSettings__From:?set Email__EmailSettings__From}
      Email__EmailSettings__DisplayName: ${Email__EmailSettings__DisplayName:-SIAED}
      Email__ClientGmail__ClientId: ${Email__ClientGmail__ClientId:-}
      Email__ClientGmail__ProjectId: ${Email__ClientGmail__ProjectId:-}
      Email__ClientGmail__AuthUri: ${Email__ClientGmail__AuthUri:-}
      Email__ClientGmail__TokenUri: ${Email__ClientGmail__TokenUri:-}
      Email__ClientGmail__AuthProviderX509CertUrl: ${Email__ClientGmail__AuthProviderX509CertUrl:-}
      Email__ClientGmail__ClientSecret: ${Email__ClientGmail__ClientSecret:-}
      Email__ClientGmail__JavascriptOrigins__0: ${Email__ClientGmail__JavascriptOrigins:-}
    ports:
      - "7142:7142"
    restart: unless-stopped
    volumes:
      - siaed-api-logs:/app/logs
    networks:
      - nginx_net

volumes:
  siaed-api-logs:

networks:
  nginx_net:
    external: true
